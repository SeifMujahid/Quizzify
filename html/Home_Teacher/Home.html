<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- stylesheets -->
    <link rel="stylesheet" href="css/normalize.css" />
    <link rel="stylesheet" href="css/all.min.css" />
    <link rel="stylesheet" href="css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/main.css" />
    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <!-- title -->
    <title>Quizzify</title>
  </head>
  <body>
    <div class="container-fluid w-100 vh-100 d-flex p-3">
      <div
        class="left-nav h-100 d-flex flex-column p-3 position-fixed start-0 top-0"
      >
        <h1>Quizzify</h1>
        <ul class="d-flex flex-column mt-4 fs-4 fw-light">
          <li class="w-100 mb-4">
            <a href="#"
              ><i class="fa-solid fa-house me-4"></i><span>Home</span></a
            >
          </li>
          <li class="w-100 mb-4">
            <a href="#"
              ><i class="fa-solid fa-user me-4"></i><span>User Profile</span></a
            >
          </li>
          <li class="w-100 mb-4">
            <a href="#"
              ><i class="fa-solid fa-user-graduate me-4"></i
              ><span>Students</span></a
            >
          </li>
          <li class="w-100 mb-4">
            <a href="#"
              ><i class="fa-solid fa-circle-info me-4"></i><span>About US</span>
            </a>
          </li>
          <li class="w-100 mb-4">
            <a href="#"
              ><i class="fa-solid fa-phone me-4"></i><span>Contact US</span></a
            >
          </li>
          <li class="w-100 mb-4">
            <a href="#"
              ><i class="fa-solid fa-right-from-bracket me-4"></i
              ><span>Log Out</span></a
            >
          </li>
        </ul>
      </div>
      <div class="content h-100 w-100 p-3">
        <div class="info w-100 p-3 row">
          <div class="profile-img col-3 m-auto">
            <img class="w-100" src="./imgs/team-01.png" alt="" />
          </div>
          <div class="info-details col-9 m-auto mt-3">
            <h1 class="fs-4 fw-light">Mohamed Ahmed</h1>
            <div
              class="details d-flex justify-content-between mt-2 fw-bold px-4"
            >
              <div class="left-box text-center">
                <p class="m-0">Created</p>
                <p class="m-0">38</p>
              </div>
              <div class="middel-box text-center">
                <p class="m-0">InProgres</p>
                <p class="m-0">12</p>
              </div>
              <div class="right-box text-center">
                <p class="m-0">Score</p>
                <p class="m-0">200</p>
              </div>
            </div>
          </div>
        </div>
        <div class="create w-100 p-3">
          <h2 class="fs-5 mb-3">Create Quiz</h2>
          <div
            class="add w-100 p-3 d-flex justify-content-center align-items-center"
          >
            <a href="#"
              ><i class="fa-solid fa-plus fs-2 fw-bold text-warning"></i
            ></a>
          </div>
        </div>
        <div class="sibjects w-100 p-3">
          <h2 class="fs-5 mb-3">Subjects</h2>
          <div class="subjects-content row g-3">
            <div class="sub-box col-3">
              <img class="w-100" src="./imgs/course-01.jpg" alt="" />
            </div>
            <div class="sub-box col-3">
              <img class="w-100" src="./imgs/course-02.jpg" alt="" />
            </div>
            <div class="sub-box col-3">
              <img class="w-100" src="./imgs/course-03.jpg" alt="" />
            </div>
            <div class="sub-box col-3">
              <img class="w-100" src="./imgs/course-04.jpg" alt="" />
            </div>
            <div class="sub-box col-3">
              <img class="w-100" src="./imgs/course-05.jpg" alt="" />
            </div>
            <div class="sub-box col-3">
              <img class="w-100" src="./imgs/course-02.jpg" alt="" />
            </div>
            <div class="sub-box col-3">
              <img class="w-100" src="./imgs/course-05.jpg" alt="" />
            </div>
            <div class="sub-box col-3">
              <div
                class="add w-100 h-100 p-3 d-flex justify-content-center align-items-center"
              >
                <a href="#"
                  ><i class="fa-solid fa-plus fs-2 fw-bold text-warning"></i
                ></a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
