<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- stylesheets -->
    <link rel="stylesheet" href="css/normalize.css" />
    <link rel="stylesheet" href="css/all.min.css" />
    <link rel="stylesheet" href="css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/main.css" />
    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <!-- title -->
    <title>Quizzify</title>
  </head>
  <body>
    <div class="container-fluid w-100 vh-100 d-flex p-3">
      <div
        class="left-nav h-100 d-flex flex-column p-3 position-fixed start-0 top-0"
      >
        <h1>Quizzify</h1>
        <ul class="d-flex flex-column mt-4 fs-4 fw-light">
          <li class="w-100 mb-4">
            <a href="#"
              ><i class="fa-solid fa-house me-4"></i><span>Home</span></a
            >
          </li>
          <li class="w-100 mb-4">
            <a href="#"
              ><i class="fa-solid fa-user me-4"></i><span>User Profile</span></a
            >
          </li>
          <li class="w-100 mb-4">
            <a href="#"
              ><i class="fa-solid fa-user-graduate me-4"></i
              ><span>Students</span></a
            >
          </li>
          <li class="w-100 mb-4">
            <a href="#"
              ><i class="fa-solid fa-circle-info me-4"></i><span>About US</span>
            </a>
          </li>
          <li class="w-100 mb-4">
            <a href="#"
              ><i class="fa-solid fa-phone me-4"></i><span>Contact US</span></a
            >
          </li>
          <li class="w-100 mb-4">
            <a href="#"
              ><i class="fa-solid fa-right-from-bracket me-4"></i
              ><span>Log Out</span></a
            >
          </li>
        </ul>
      </div>
      <div class="content h-100 w-100 p-3">
        <form action="" class="row h-100">
          <div class="left-content h-100 col-9 p-3">
            <div
              class="in-img w-100 p-3 d-flex align-items-center justify-content-center"
            >
              <input type="file" id="img-input" accept="image/*" />
              <label for="img-input"
                ><i class="fa-regular fa-image fs-2"></i
              ></label>
            </div>
            <div class="create w-100 p-3">
              <h2 class="fs-5 mb-3">
                Quiz Name <i class="fa-solid fa-pencil mx-2 fs-4"></i>
              </h2>
              <div class="in-name w-100 shadow-lg">
                <textarea
                  name="quiz-name"
                  id=""
                  placeholder="Write Quiz Name"
                  maxlength="200"
                ></textarea>
              </div>
            </div>
            <div class="sibjects w-100 p-3">
              <h2 class="fs-5 mb-3">Choose Quiz Subject</h2>
              <div class="subject-content w-100 row p-3 g-2">
                <div class="choose col-3">
                  <input
                    class="visually-hidden"
                    type="radio"
                    name="quiz-subject"
                    id="math"
                    value="math"
                  />
                  <label for="math" class="subject-label">
                    <img src="./imgs/course-01.jpg" alt="" class="w-100" />
                  </label>
                </div>

                <div class="choose col-3">
                  <input
                    class="visually-hidden"
                    type="radio"
                    name="quiz-subject"
                    id="arabic"
                    value="arabic"
                  />
                  <label for="arabic" class="subject-label">
                    <img src="./imgs/course-02.jpg" alt="" class="w-100" />
                  </label>
                </div>

                <div class="choose col-3">
                  <input
                    class="visually-hidden"
                    type="radio"
                    name="quiz-subject"
                    id="physics"
                    value="physics"
                  />
                  <label for="physics" class="subject-label">
                    <img src="./imgs/course-03.jpg" alt="" class="w-100" />
                  </label>
                </div>

                <div class="choose col-3">
                  <input
                    class="visually-hidden"
                    type="radio"
                    name="quiz-subject"
                    id="french"
                    value="french"
                  />
                  <label for="french" class="subject-label">
                    <img src="./imgs/course-04.jpg" alt="" class="w-100" />
                  </label>
                </div>

                <div class="choose col-3">
                  <input
                    class="visually-hidden"
                    type="radio"
                    name="quiz-subject"
                    id="english"
                    value="english"
                  />
                  <label for="english" class="subject-label">
                    <img src="./imgs/course-05.jpg" alt="" class="w-100" />
                  </label>
                </div>

                <div class="choose col-3">
                  <input
                    class="visually-hidden"
                    type="radio"
                    name="quiz-subject"
                    id="programming"
                    value="programming"
                  />
                  <label for="programming" class="subject-label">
                    <img src="./imgs/course-04.jpg" alt="" class="w-100" />
                  </label>
                </div>

                <div class="choose col-3">
                  <input
                    class="visually-hidden"
                    type="radio"
                    name="quiz-subject"
                    id="electronics"
                    value="electronics"
                  />
                  <label for="electronics" class="subject-label">
                    <img src="./imgs/course-02.jpg" alt="" class="w-100" />
                  </label>
                </div>

                <div class="choose col-3">
                  <input
                    class="visually-hidden"
                    type="radio"
                    name="quiz-subject"
                    id="chemistry"
                    value="chemistry"
                  />
                  <label for="chemistry" class="subject-label">
                    <img src="./imgs/course-01.jpg" alt="" class="w-100" />
                  </label>
                </div>
              </div>
            </div>
            <div class="sub w-100 d-flex justify-content-center">
              <a href="#" class="btn rounded-pill">Create Quiz</a>
            </div>
          </div>
          <div class="right-content h-100 col-3 p-3">
            <div
              class="first-box box w-100 d-flex flex-column align-items-center p-3"
            >
              <i class="fa-solid fa-hourglass-half"></i>
              <p>Select Time Of The Quiz</p>
              <fieldset class="d-flex justify-content-center">
                <input type="number" name="qiuz-time" value="30" id="time" />
                <label for="time" class="ms-2 mt-1">MIN</label>
              </fieldset>
            </div>
            <div
              class="second-box box w-100 d-flex flex-column align-items-center p-3"
            >
              <i class="fa-solid fa-question"></i>
              <p>Add Numbers Of Questions</p>
              <fieldset class="d-flex justify-content-center">
                <input type="number" name="no-questions" value="30" id="time" />
                <label for="time" class="ms-2 mt-1">Questions</label>
              </fieldset>
            </div>
            <div
              class="third-box box w-100 d-flex flex-column align-items-center p-3"
            >
              <i class="fa-solid fa-signal"></i>
              <p>Chose Level Of Hardness</p>
              <fieldset class="d-flex justify-content-evenly">
                <input type="radio" name="Hardness" id="hard" value="hard" />
                <label for="hard" class="radio-label">Hard</label>
                <input
                  type="radio"
                  name="Hardness"
                  id="medium"
                  value="medium"
                />
                <label for="medium" class="radio-label">Medium</label>
                <input type="radio" name="Hardness" id="easy" value="easy" />
                <label for="easy" class="radio-label">Easy</label>
              </fieldset>
            </div>
            <div class="sub w-100 d-flex justify-content-center mt-3">
              <button type="submit" class="btn rounded-pill">
                Submit Quiz
              </button>
            </div>
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
